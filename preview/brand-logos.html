<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: var(--bg-surface); margin: 0; padding: 28px 32px; font-family: var(--font-sans); }
  .row { display:flex; gap: 28px; align-items:center; flex-wrap: wrap; }
  .specimen { display:flex; flex-direction:column; align-items:center; gap: 10px; }
  .swatch { background: #fff; border: 1px solid var(--border-1); padding: 14px; }
  .lbl { font-size: 10px; font-family: var(--font-mono); color: var(--fg-3); }
  .name { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="specimen">
      <div class="swatch"><img src="../assets/blacklist-favicon.svg" width="48" height="48" alt="" /></div>
      <span class="name">Favicon · 32px</span>
      <span class="lbl">assets/blacklist-favicon.svg</span>
    </div>
    <div class="specimen">
      <div class="swatch" style="padding: 22px 24px;"><img src="../assets/blacklist-logo-on-white.svg" style="width: 280px; display:block;" alt="The Blacklist Alliance" /></div>
      <span class="name">Wordmark · on white</span>
      <span class="lbl">assets/blacklist-logo-on-white.svg</span>
    </div>
    <div class="specimen">
      <div class="swatch" style="background:#000; padding: 22px 24px; border-color:#000;"><img src="../assets/blacklist-logo-on-black.svg" style="width: 280px; display:block;" alt="" /></div>
      <span class="name">Wordmark · on black</span>
      <span class="lbl">assets/blacklist-logo-on-black.svg</span>
    </div>
  </div>
</body></html>
