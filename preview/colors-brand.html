<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: var(--bg-surface); margin: 0; padding: 24px 32px; font-family: var(--font-sans); }
  .row { display:flex; gap: 18px; }
  .swatch { flex:1; aspect-ratio: 1.4 / 1; display:flex; flex-direction:column; justify-content:flex-end; padding: 14px; border: 1px solid var(--border-1); }
  .swatch .name { font-size: 13px; font-weight: 600; letter-spacing:.04em; text-transform: uppercase; }
  .swatch .hex { font-size: 12px; font-family: var(--font-mono); }
  .red { background: var(--bl-red); color: #fff; border-color: var(--bl-red); }
  .black { background: #000; color: #fff; border-color: #000; }
  .white { background: #fff; color: var(--fg-1); }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch red"><span class="name">Brand Red</span><span class="hex">#A50100</span></div>
    <div class="swatch black"><span class="name">Black</span><span class="hex">#000000</span></div>
    <div class="swatch white"><span class="name">White</span><span class="hex">#FFFFFF</span></div>
  </div>
</body></html>
