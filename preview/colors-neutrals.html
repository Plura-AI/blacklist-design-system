<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: var(--bg-surface); margin: 0; padding: 24px 28px; font-family: var(--font-sans); }
  .row { display:grid; grid-template-columns: repeat(12, 1fr); gap: 4px; }
  .sw { aspect-ratio: 1 / 1.6; display:flex; flex-direction: column; justify-content: flex-end; padding: 8px; font-size: 10px; font-family: var(--font-mono); }
  .sw .n { font-family: var(--font-sans); font-weight: 600; font-size: 11px; }
  .light { color: #000; }
  .dark { color: #fff; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw light" style="background:#FFFFFF; border:1px solid var(--border-1);"><span class="n">00</span><span>#FFF</span></div>
    <div class="sw light" style="background:#F7F7F7;"><span class="n">05</span><span>#F7F7F7</span></div>
    <div class="sw light" style="background:#EFEFEF;"><span class="n">10</span><span>#EFEFEF</span></div>
    <div class="sw light" style="background:#E0E0E0;"><span class="n">20</span><span>#E0E0E0</span></div>
    <div class="sw light" style="background:#C9C9C9;"><span class="n">30</span><span>#C9C9C9</span></div>
    <div class="sw light" style="background:#A8A8A8;"><span class="n">40</span><span>#A8A8A8</span></div>
    <div class="sw dark" style="background:#8C8C8C;"><span class="n">50</span><span>#8C8C8C</span></div>
    <div class="sw dark" style="background:#6F6F6F;"><span class="n">60</span><span>#6F6F6F</span></div>
    <div class="sw dark" style="background:#525252;"><span class="n">70</span><span>#525252</span></div>
    <div class="sw dark" style="background:#393939;"><span class="n">80</span><span>#393939</span></div>
    <div class="sw dark" style="background:#1F1F1F;"><span class="n">90</span><span>#1F1F1F</span></div>
    <div class="sw dark" style="background:#000000;"><span class="n">100</span><span>#000</span></div>
  </div>
</body></html>
