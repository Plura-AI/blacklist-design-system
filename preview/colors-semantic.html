<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: var(--bg-surface); margin: 0; padding: 24px 28px; font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .item { border: 1px solid var(--border-1); }
  .chip { height: 56px; }
  .meta { padding: 10px 12px; }
  .name { font-size: 12px; font-weight: 600; letter-spacing:.06em; text-transform: uppercase; }
  .hex { font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="chip" style="background:#117A3D;"></div><div class="meta"><div class="name">Success</div><div class="hex">#117A3D · #E5F4EC</div></div></div>
    <div class="item"><div class="chip" style="background:#B36B00;"></div><div class="meta"><div class="name">Warning</div><div class="hex">#B36B00 · #FFF3DD</div></div></div>
    <div class="item"><div class="chip" style="background:#A50100;"></div><div class="meta"><div class="name">Danger</div><div class="hex">#A50100 · #FBE5E5</div></div></div>
    <div class="item"><div class="chip" style="background:#0F4C8A;"></div><div class="meta"><div class="name">Info</div><div class="hex">#0F4C8A · #E5EEF7</div></div></div>
  </div>
</body></html>
