<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: var(--bg-surface); margin: 0; padding: 28px 32px; font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 600px; }
  label { display:flex; flex-direction:column; gap: 6px; font-size: 12px; font-weight:600; letter-spacing:.06em; text-transform: uppercase; color: var(--fg-2); }
  input, select { font-family: var(--font-sans); font-size: 15px; padding: 12px 14px; border: 1px solid var(--border-1); border-radius: 0; background: #fff; color: var(--fg-1); transition: border-color 120ms, box-shadow 120ms; }
  input:focus, select:focus { outline: none; border-color: var(--bl-red); box-shadow: 0 0 0 3px rgba(165,1,0,0.28); }
  input::placeholder { color: var(--fg-4); text-transform: none; letter-spacing: 0; font-weight: 400; }
  .err input { border-color: var(--bl-red); }
  .err .help { color: var(--bl-red); text-transform: none; letter-spacing: 0; font-weight: 400; font-size: 12px; }
</style>
</head>
<body>
  <div class="grid">
    <label>Phone number<input value="+1 (619) 555-0102" /></label>
    <label>Carrier<select><option>Twilio</option><option>Plivo</option></select></label>
    <label>Email<input placeholder="name@company.com" /></label>
    <label class="err">Federal ID<input value="00-000" /><span class="help">Must be a 9-digit EIN.</span></label>
  </div>
</body></html>
