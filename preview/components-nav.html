<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: var(--bg-surface); margin: 0; padding: 0; font-family: var(--font-sans); }
  .nav { display:flex; align-items:center; padding: 18px 24px; border-bottom: 1px solid var(--border-1); gap: 32px; }
  .logo { height: 18px; }
  .links { display:flex; gap: 22px; }
  .links a { font-size: 12px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--fg-1); text-decoration:none; }
  .links a:hover { color: var(--bl-red); }
  .right { margin-left:auto; display:flex; gap: 12px; align-items:center; }
  .signin { font-size: 12px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--fg-1); }
  .cta { font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; padding: 10px 16px; background: var(--bl-red); color: #fff; }
</style>
</head>
<body>
  <nav class="nav">
    <img src="../assets/blacklist-logo-on-white.svg" class="logo" alt="The Blacklist Alliance" />
    <div class="links">
      <a>Services</a>
      <a>Solutions</a>
      <a>Blog</a>
      <a>Contact</a>
    </div>
    <div class="right">
      <a class="signin">Sign in</a>
      <a class="cta">Click to call</a>
    </div>
  </nav>
</body></html>
