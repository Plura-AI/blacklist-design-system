<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: var(--bg-surface); margin: 0; padding: 24px 32px; font-family: var(--font-sans); }
  table { border-collapse: collapse; width: 100%; }
  th, td { padding: 10px 14px; font-size: 13px; text-align: left; border-bottom: 1px solid var(--border-1); }
  th { font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--fg-3); background: var(--gray-05); }
  .swatch { display:inline-block; width: 28px; height: 28px; border: 1px solid var(--border-1); vertical-align: middle; margin-right: 10px; }
  .mono { font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); }
</style>
</head>
<body>
  <table>
    <thead><tr><th>Token</th><th>Value</th><th>Swatch</th></tr></thead>
    <tbody>
      <tr><td>--r-0 · sharp (default)</td><td class="mono">0px</td><td><span class="swatch" style="background:#000;"></span></td></tr>
      <tr><td>--r-pill</td><td class="mono">0px</td><td><span class="swatch" style="background:#A50100;"></span></td></tr>
    </tbody>
  </table>
  <p style="margin-top: 16px; font-size: 12px; color: var(--fg-2); line-height: 1.5;">All corners are square. There is no radius scale — the brand is uncompromisingly sharp.</p>
</body></html>
