<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: var(--bg-surface); margin: 0; padding: 24px 32px; font-family: var(--font-sans); }
  .row { display:flex; gap: 32px; align-items:center; flex-wrap: wrap; }
  .demo { display:flex; flex-direction: column; align-items:flex-start; gap: 10px; }
  .lbl { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--fg-3); font-weight: 600; }
  .bar-56 { width: 56px; height: 4px; background: var(--bl-red); }
  .bar-full { width: 280px; height: 4px; background: var(--bl-red); }
  .head { font-size: 28px; font-weight: 700; letter-spacing:-0.02em; }
  .small { font-size: 14px; }
</style>
</head>
<body>
  <div class="row">
    <div class="demo">
      <span class="lbl">Section accent · 56×4</span>
      <div class="bar-56"></div>
      <div class="head">Litigation Firewall</div>
    </div>
    <div class="demo">
      <span class="lbl">Full-bleed accent</span>
      <div class="bar-full"></div>
      <div class="small">Above big black/white sections</div>
    </div>
  </div>
</body></html>
