<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: var(--bg-surface); margin: 0; padding: 24px 28px; font-family: var(--font-sans); }
  .row { display:flex; align-items:flex-end; gap: 12px; }
  .step { display:flex; flex-direction:column; align-items:center; gap: 6px; }
  .box { background: #A50100; border-radius: 0; }
  .lbl { font-size: 10px; font-family: var(--font-mono); color: var(--fg-3); }
</style>
</head>
<body>
  <div class="row">
    <div class="step"><div class="box" style="width:4px; height:18px;"></div><span class="lbl">1 · 4</span></div>
    <div class="step"><div class="box" style="width:8px; height:24px;"></div><span class="lbl">2 · 8</span></div>
    <div class="step"><div class="box" style="width:12px; height:32px;"></div><span class="lbl">3 · 12</span></div>
    <div class="step"><div class="box" style="width:16px; height:40px;"></div><span class="lbl">4 · 16</span></div>
    <div class="step"><div class="box" style="width:20px; height:48px;"></div><span class="lbl">5 · 20</span></div>
    <div class="step"><div class="box" style="width:24px; height:56px;"></div><span class="lbl">6 · 24</span></div>
    <div class="step"><div class="box" style="width:32px; height:64px;"></div><span class="lbl">7 · 32</span></div>
    <div class="step"><div class="box" style="width:40px; height:72px;"></div><span class="lbl">8 · 40</span></div>
    <div class="step"><div class="box" style="width:48px; height:80px;"></div><span class="lbl">9 · 48</span></div>
    <div class="step"><div class="box" style="width:64px; height:92px;"></div><span class="lbl">10 · 64</span></div>
    <div class="step"><div class="box" style="width:80px; height:104px;"></div><span class="lbl">11 · 80</span></div>
  </div>
</body></html>
