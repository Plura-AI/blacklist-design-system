<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: var(--bg-surface); margin: 0; padding: 28px 32px; }
  .row { display:flex; align-items:flex-end; gap: 20px; flex-wrap: wrap; }
  .specimen { display:flex; flex-direction:column; gap: 4px; }
  .label { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--fg-3); font-weight: 600; }
  .glyph { font-family: var(--font-sans); color: var(--fg-1); line-height: 1; }
</style>
</head>
<body>
  <div class="row">
    <div class="specimen">
      <span class="label">Display · 96/Bold</span>
      <span class="glyph" style="font-size:88px; font-weight:700; letter-spacing:-0.03em; text-transform:lowercase;">risk less.</span>
    </div>
  </div>
</body></html>
