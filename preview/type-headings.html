<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>

  .label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--fg-3); font-weight: 600; }
</style>
</head>
<body>
  <div class="grid">
    <span class="label">H1 · 56/700</span>
    <span style="font-size:48px; font-weight:700; letter-spacing:-0.02em; line-height:1;">Risk less. Connect more.</span>

    <span class="label">H2 · 40/700</span>
    <span style="font-size:36px; font-weight:700; letter-spacing:-0.02em; line-height:1.05;">Comprehensive TCPA Compliance</span>

    <span class="label">H3 · 28/600</span>
    <span style="font-size:26px; font-weight:600; letter-spacing:-0.01em;">Litigation Firewall, in real time</span>

    <span class="label">H4 · 24/600</span>
    <span style="font-size:22px; font-weight:600;">Built for contact centers</span>
  </div>
</body></html>
