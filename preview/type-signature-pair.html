<!doctype html>
<html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { background: var(--bg-surface); margin: 0; padding: 24px 32px; }
  .row { display:flex; gap: 28px; flex-wrap:wrap; align-items:center; }
  .specimen { display:flex; flex-direction:column; gap: 4px; }
  .lbl { font-size: 11px; letter-spacing:.1em; text-transform: uppercase; color: var(--fg-3); font-weight:600; }
</style>
</head>
<body>
  <div class="row">
    <div class="specimen"><span class="lbl">Tagline · lowercase</span>
      <span style="font-size:46px; font-weight:700; letter-spacing:-0.03em; line-height:.95; text-transform:lowercase;">risk less.<br/>connect more.</span>
    </div>
    <div class="specimen" style="gap:8px;">
      <span class="lbl">Eyebrow / Subhead · UPPERCASE</span>
      <span style="font-size:14px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--bl-red);">Tcpa litigation solutions</span>
      <span style="font-size:18px; font-weight:500; letter-spacing:.06em; text-transform:uppercase;">Safeguard ai-enabled communications</span>
    </div>
  </div>
</body></html>
